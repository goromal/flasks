<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ region.name }} Quiz - LA Geography</title>
    <link rel="icon" type="image/svg+xml" href="{{ urlroot }}favicon.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .back-link {
            color: #11998e;
            text-decoration: none;
            font-weight: 600;
            font-size: 1em;
        }

        .score {
            color: #333;
            font-weight: 600;
            font-size: 1em;
        }

        .city-prompt {
            text-align: center;
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
            margin: 10px 0;
        }

        .instruction {
            text-align: center;
            color: #666;
            font-size: 0.9em;
        }

        .map-container {
            flex: 1;
            background: white;
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .canvas-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }

        #mapCanvas {
            cursor: crosshair;
            touch-action: none;
            display: block;
            max-width: 100%;
            height: auto;
        }

        .feedback {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 90%;
            z-index: 1000;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback-icon {
            font-size: 2.5em;
            margin-bottom: 5px;
        }

        .feedback-text {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .feedback-distance {
            color: #666;
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        .feedback-next {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .feedback-next:active {
            transform: scale(0.95);
        }

        .controls {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-debug {
            background: linear-gradient(135deg, #ff9a56 0%, #ffdd59 100%);
        }

        .btn-debug.active {
            background: linear-gradient(135deg, #0f9b0f 0%, #38ef7d 100%);
        }

        .debug-panel {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            display: none;
        }

        .debug-panel.show {
            display: block;
        }

        .debug-info {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        .debug-info p {
            margin: 5px 0;
            color: #333;
        }

        .debug-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        @media (min-width: 600px) {
            .debug-buttons {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .add-city-form {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .add-city-form.show {
            display: block;
        }

        .form-group {
            margin-bottom: 10px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
        }

        .form-group input:focus {
            outline: none;
            border-color: #11998e;
        }

        @media (max-width: 600px) {
            .city-prompt {
                font-size: 1.5em;
            }

            .header {
                padding: 12px 15px;
            }

            .controls {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <a href="{{ urlroot }}" class="back-link">← Back</a>
            <div class="score">Score: <span id="score">{{ score }}</span>/<span id="total">{{ total }}</span></div>
        </div>
        <div class="city-prompt" id="cityPrompt">{{ city.name }}</div>
        <div class="instruction">Tap the location on the map</div>
    </div>

    <div class="map-container">
        <div class="canvas-wrapper">
            <canvas id="mapCanvas"></canvas>
        </div>
        <div class="feedback" id="feedback">
            <div class="feedback-icon" id="feedbackIcon"></div>
            <div class="feedback-text" id="feedbackText"></div>
            <div class="feedback-distance" id="feedbackDistance"></div>
            <button class="feedback-next" onclick="nextCity()">Continue</button>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-secondary" onclick="resetQuiz()">Reset Score</button>
        <button class="btn btn-debug" id="debugToggle" onclick="toggleDebug()">Debug Mode</button>
    </div>

    <div class="debug-panel" id="debugPanel">
        <h3 style="margin-bottom: 15px; color: #333;">Debug Mode</h3>
        <div class="debug-info">
            <p><strong>Current City:</strong> <span id="debugCityName">{{ city.name }}</span> (ID: <span id="debugCityId">{{ city.id }}</span>)</p>
            <p><strong>Programmed Location:</strong> (<span id="debugCityX">{{ city.x }}</span>, <span id="debugCityY">{{ city.y }}</span>)</p>
            <p><strong>Last Click:</strong> <span id="debugLastClick">None</span></p>
        </div>
        <div class="debug-buttons">
            <button class="btn" onclick="setCoordinatesMode()">Update Location</button>
            <button class="btn" onclick="skipCity()">Skip to Next</button>
            <button class="btn" onclick="showProgrammedLocation()">Show Location</button>
            <button class="btn" onclick="showAddCityForm()">Add New City</button>
        </div>
        <div class="add-city-form" id="addCityForm">
            <h4 style="margin-bottom: 10px; color: #333;">Add New City</h4>
            <div class="form-group">
                <label for="newCityName">City Name:</label>
                <input type="text" id="newCityName" placeholder="Enter city name">
            </div>
            <div class="form-group">
                <label>Click on the map to set coordinates</label>
                <p style="font-size: 0.9em; color: #666; margin-top: 5px;">
                    X: <span id="newCityX">-</span>, Y: <span id="newCityY">-</span>
                </p>
            </div>
            <div class="debug-buttons" style="margin-top: 15px;">
                <button class="btn" onclick="saveNewCity()">Save City</button>
                <button class="btn btn-secondary" onclick="cancelAddCity()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');
        const regionId = {{ region.id }};
        const urlroot = "{{ urlroot }}";

        let mapImage = new Image();
        let currentCity = { name: "{{ city.name }}", x: {{ city.x }}, y: {{ city.y }}, id: {{ city.id }} };
        let markers = [];
        let acceptanceCircle = null; // { x, y, radius } for showing acceptance zone
        let scaleFactor = 1;
        let debugMode = {{ 'true' if debug_mode else 'false' }};
        let debugAction = null; // 'set-coords' or 'add-city'
        let newCityCoords = { x: null, y: null };

        mapImage.onload = function() {
            // Scale to fit screen width while maintaining aspect ratio
            const maxWidth = Math.min(1000, window.innerWidth - 40);
            scaleFactor = maxWidth / mapImage.width;

            canvas.width = mapImage.width * scaleFactor;
            canvas.height = mapImage.height * scaleFactor;

            drawMap();
        };

        mapImage.src = "{{ urlroot }}static/" + "{{ region.map_image }}";

        function drawMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(mapImage, 0, 0, canvas.width, canvas.height);

            // Draw acceptance circle if present (outline only)
            if (acceptanceCircle) {
                ctx.beginPath();
                ctx.arc(
                    acceptanceCircle.x * scaleFactor,
                    acceptanceCircle.y * scaleFactor,
                    acceptanceCircle.radius * scaleFactor,
                    0,
                    2 * Math.PI
                );
                ctx.strokeStyle = 'rgba(17, 153, 142, 0.8)';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            // Draw markers
            markers.forEach(marker => {
                ctx.beginPath();
                const radius = marker.radius || 5;
                ctx.arc(marker.x * scaleFactor, marker.y * scaleFactor, radius, 0, 2 * Math.PI);
                ctx.fillStyle = marker.color;
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();
            });
        }

        function getCanvasCoordinates(event) {
            const rect = canvas.getBoundingClientRect();
            let clientX, clientY;

            if (event.touches) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            } else {
                clientX = event.clientX;
                clientY = event.clientY;
            }

            const x = (clientX - rect.left) / scaleFactor;
            const y = (clientY - rect.top) / scaleFactor;
            return { x, y };
        }

        function handleClick(event) {
            event.preventDefault();
            const coords = getCanvasCoordinates(event);
            const roundedX = Math.round(coords.x);
            const roundedY = Math.round(coords.y);

            // Update debug info
            if (debugMode) {
                document.getElementById('debugLastClick').textContent = `(${roundedX}, ${roundedY})`;
            }

            // Handle debug actions
            if (debugAction === 'set-coords') {
                updateCoordinates(roundedX, roundedY);
                return;
            } else if (debugAction === 'add-city') {
                newCityCoords.x = roundedX;
                newCityCoords.y = roundedY;
                document.getElementById('newCityX').textContent = roundedX;
                document.getElementById('newCityY').textContent = roundedY;
                return;
            }

            // Normal quiz mode
            fetch(urlroot + 'check/' + regionId, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ x: roundedX, y: roundedY })
            })
            .then(response => response.json())
            .then(data => {
                // Add marker for user's guess (red when wrong)
                if (!data.correct) {
                    markers.push({
                        x: coords.x,
                        y: coords.y,
                        color: 'red',
                        radius: 5
                    });
                }

                // Add marker for correct location (always small, 5px)
                markers.push({
                    x: data.correct_x,
                    y: data.correct_y,
                    color: 'green',
                    radius: 5
                });

                // Show acceptance circle (75 pixel radius)
                acceptanceCircle = {
                    x: data.correct_x,
                    y: data.correct_y,
                    radius: 75
                };

                drawMap();

                // Show feedback
                const feedback = document.getElementById('feedback');
                const icon = document.getElementById('feedbackIcon');
                const text = document.getElementById('feedbackText');
                const distance = document.getElementById('feedbackDistance');

                if (data.correct) {
                    icon.textContent = '✅';
                    text.textContent = 'Correct!';
                    text.style.color = '#4CAF50';
                } else {
                    icon.textContent = '❌';
                    text.textContent = 'Not quite!';
                    text.style.color = '#f44336';
                }

                distance.textContent = `Distance: ${data.distance} pixels`;
                feedback.classList.add('show');

                // Update score
                document.getElementById('score').textContent = data.score;
                document.getElementById('total').textContent = data.total;

                // Store next city
                currentCity.name = data.next_city;
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Error checking guess. Please try again.');
            });
        }

        function nextCity() {
            // Hide feedback
            document.getElementById('feedback').classList.remove('show');

            // Update city name
            document.getElementById('cityPrompt').textContent = currentCity.name;

            // Clear markers and acceptance circle
            markers = [];
            acceptanceCircle = null;
            drawMap();
        }

        function resetQuiz() {
            if (confirm('Are you sure you want to reset your score?')) {
                fetch(urlroot + 'reset/' + regionId, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                })
                .then(response => response.json())
                .then(data => {
                    location.reload();
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Error resetting quiz. Please try again.');
                });
            }
        }

        // Handle both click and touch events
        canvas.addEventListener('click', handleClick);
        canvas.addEventListener('touchstart', handleClick);

        // Prevent scrolling when touching the canvas
        canvas.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        // Redraw on window resize
        window.addEventListener('resize', function() {
            if (mapImage.complete) {
                const maxWidth = Math.min(1000, window.innerWidth - 40);
                const newScaleFactor = maxWidth / mapImage.width;

                if (Math.abs(newScaleFactor - scaleFactor) > 0.01) {
                    scaleFactor = newScaleFactor;
                    canvas.width = mapImage.width * scaleFactor;
                    canvas.height = mapImage.height * scaleFactor;
                    drawMap();
                }
            }
        });

        // Debug mode functions
        function toggleDebug() {
            fetch(urlroot + 'toggle-debug', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                }
            })
            .then(response => response.json())
            .then(data => {
                debugMode = data.debug_mode;
                const debugBtn = document.getElementById('debugToggle');
                const debugPanel = document.getElementById('debugPanel');

                if (debugMode) {
                    debugBtn.classList.add('active');
                    debugBtn.textContent = 'Debug Mode: ON';
                    debugPanel.classList.add('show');
                    updateDebugInfo();
                } else {
                    debugBtn.classList.remove('active');
                    debugBtn.textContent = 'Debug Mode: OFF';
                    debugPanel.classList.remove('show');
                    debugAction = null;
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Error toggling debug mode.');
            });
        }

        function updateDebugInfo() {
            document.getElementById('debugCityName').textContent = currentCity.name;
            document.getElementById('debugCityId').textContent = currentCity.id;
            document.getElementById('debugCityX').textContent = currentCity.x;
            document.getElementById('debugCityY').textContent = currentCity.y;
        }

        function showProgrammedLocation() {
            // Clear existing markers
            markers = [];

            // Add marker for programmed location
            markers.push({
                x: currentCity.x,
                y: currentCity.y,
                color: 'blue',
                radius: 10
            });

            drawMap();
        }

        function skipCity() {
            if (confirm(`Skip "${currentCity.name}" and move to the next city?`)) {
                location.reload();
            }
        }

        function setCoordinatesMode() {
            debugAction = 'set-coords';
            const instruction = document.querySelector('.instruction');
            instruction.textContent = 'Click on the map to set the correct coordinates for ' + currentCity.name;
            instruction.style.color = '#ff9a56';
            instruction.style.fontWeight = '600';
        }

        function updateCoordinates(x, y) {
            if (confirm(`Set coordinates for "${currentCity.name}" to (${x}, ${y})?`)) {
                fetch(urlroot + 'update-coordinates/' + currentCity.id, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ x: x, y: y })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'updated') {
                        alert(`Coordinates updated successfully for ${currentCity.name}!`);
                        currentCity.x = x;
                        currentCity.y = y;
                        updateDebugInfo();
                        resetInstructionText();
                        debugAction = null;
                    } else {
                        alert('Error updating coordinates: ' + (data.error || 'Unknown error'));
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Error updating coordinates.');
                });
            } else {
                resetInstructionText();
                debugAction = null;
            }
        }

        function showAddCityForm() {
            const form = document.getElementById('addCityForm');
            form.classList.add('show');
            debugAction = 'add-city';
            const instruction = document.querySelector('.instruction');
            instruction.textContent = 'Click on the map to set coordinates for the new city';
            instruction.style.color = '#ff9a56';
            instruction.style.fontWeight = '600';
        }

        function cancelAddCity() {
            const form = document.getElementById('addCityForm');
            form.classList.remove('show');
            document.getElementById('newCityName').value = '';
            document.getElementById('newCityX').textContent = '-';
            document.getElementById('newCityY').textContent = '-';
            newCityCoords = { x: null, y: null };
            debugAction = null;
            resetInstructionText();
        }

        function saveNewCity() {
            const name = document.getElementById('newCityName').value.trim();
            if (!name) {
                alert('Please enter a city name.');
                return;
            }
            if (newCityCoords.x === null || newCityCoords.y === null) {
                alert('Please click on the map to set coordinates.');
                return;
            }

            fetch(urlroot + 'add-city/' + regionId, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    name: name,
                    x: newCityCoords.x,
                    y: newCityCoords.y
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'added') {
                    alert(`City "${data.name}" added successfully!`);
                    cancelAddCity();
                    location.reload(); // Reload to update city list
                } else {
                    alert('Error adding city: ' + (data.error || 'Unknown error'));
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Error adding city.');
            });
        }

        function resetInstructionText() {
            const instruction = document.querySelector('.instruction');
            instruction.textContent = 'Tap the location on the map';
            instruction.style.color = '#666';
            instruction.style.fontWeight = 'normal';
        }

        // Initialize debug mode UI if enabled
        if (debugMode) {
            const debugBtn = document.getElementById('debugToggle');
            const debugPanel = document.getElementById('debugPanel');
            debugBtn.classList.add('active');
            debugBtn.textContent = 'Debug Mode: ON';
            debugPanel.classList.add('show');
            updateDebugInfo();
        }
    </script>
</body>
</html>
