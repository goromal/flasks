<!DOCTYPE html>
<html>
<head>
  <title>Tasks</title>
  <meta charset="utf-8">
  <link rel="icon" type="image/svg+xml" href="{{ subdomain }}/favicon.svg">
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; max-width: 620px; }
    h1 { margin-bottom: 24px; }
    h2 { font-size: 20px; margin-bottom: 20px; }
    label { display: block; margin: 12px 0 4px; font-weight: bold; }
    input[type="text"], input[type="date"], textarea {
      width: 100%; padding: 8px; box-sizing: border-box;
      border: 1px solid #ccc; border-radius: 4px; font-size: 14px;
    }
    textarea { height: 80px; resize: vertical; }
    #notes-section { margin-top: 4px; display: none; }
    #notes-toggle {
      cursor: pointer; color: #0066cc; font-size: 13px;
      margin-top: 8px; display: inline-block; user-select: none;
    }
    button[type="submit"] {
      margin-top: 20px; padding: 10px 24px; background: #0066cc;
      color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer;
    }
    button[type="submit"]:disabled { background: #aaa; cursor: not-allowed; }
    #results { list-style: none; padding: 0; margin-top: 20px; display: none; }
    #results li { padding: 4px 0; font-family: monospace; font-size: 14px; }
    #results li.ok { color: green; }
    #results li.error { color: red; }

    .section-divider { margin: 36px 0; border: none; border-top: 1px solid #ccc; }
    #spec-error { color: red; margin-top: 8px; display: none; }
    #spec-calendar { margin-top: 24px; display: none; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .cal-header {
      text-align: center; font-size: 11px; font-weight: bold; color: #666; padding: 3px 0;
    }
    .cal-month-label {
      grid-column: 1 / span 7; font-size: 12px; font-weight: bold;
      color: #333; padding: 8px 2px 2px;
    }
    .cal-cell {
      height: 44px; border: 1px dashed #ddd; border-radius: 3px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-size: 11px; position: relative; background: #fafafa;
    }
    .cal-cell.out-of-range { background: transparent; border: none; visibility: hidden; }
    .cal-cell.skip { background: #f0f0f0; border: 1px solid #e0e0e0; color: #aaa; }
    .cal-cell.ok { background: #e8f5e9; border: 1px solid #81c784; color: #2e7d32; }
    .cal-cell.error { background: #ffebee; border: 1px solid #e57373; color: #c62828; cursor: help; }
    .cal-cell .day-num { font-weight: bold; font-size: 12px; }
    .cal-cell .badge {
      font-size: 9px; background: #43a047; color: white;
      border-radius: 8px; padding: 0 5px; margin-top: 2px; line-height: 14px;
    }
    .cal-cell.error .badge { background: #e53935; }

    .csv-group-header { font-weight: bold; margin: 16px 0 6px; font-size: 15px; color: #444; }
    .csv-item-row {
      display: flex; gap: 8px; align-items: center; margin-bottom: 6px;
    }
    .csv-item-row select {
      width: 70px; flex-shrink: 0; padding: 6px 4px;
      border: 1px solid #ccc; border-radius: 4px; font-size: 13px;
    }
    .csv-item-row .csv-title {
      flex: 1; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;
    }
    .csv-item-row .csv-desc {
      flex: 1; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px;
      font-size: 12px; color: #555;
    }
    .csv-item-row .csv-delete {
      flex-shrink: 0; background: none; border: 1px solid #ccc; border-radius: 4px;
      cursor: pointer; padding: 4px 8px; font-size: 14px; color: #888;
    }
    .csv-item-row .csv-delete:hover { background: #fee; color: #c00; }
    .csv-item-row .csv-day {
      width: 70px; flex-shrink: 0; padding: 6px 4px;
      border: 1px solid #ccc; border-radius: 4px; font-size: 13px;
    }
    .csv-item-row .csv-day:disabled { visibility: hidden; }
    #csv-dirty-banner {
      background: #fffbe6; border: 1px solid #f0c040; color: #7a5c00;
      padding: 8px 14px; border-radius: 4px; margin-bottom: 12px; font-size: 14px;
    }
    #csv-add-row { margin: 10px 0; }
    #csv-add-btn {
      padding: 6px 16px; background: #f5f5f5; border: 1px solid #ccc;
      border-radius: 4px; cursor: pointer; font-size: 14px;
    }
    #csv-save-btn {
      margin-top: 20px; padding: 10px 24px; background: #0066cc;
      color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer;
    }
    #csv-save-btn:disabled { background: #aaa; cursor: not-allowed; }
    #csv-save-status { margin-top: 8px; font-size: 14px; color: #555; min-height: 20px; }
  </style>
</head>
<body>
  <h1>Upload Tasks</h1>
  <form id="task-form" onsubmit="submitTask(event)">
    <label for="name">Task name</label>
    <input type="text" id="name" name="name" required placeholder="e.g. P1: Weekly review">

    <label for="date">Start date</label>
    <input type="date" id="date" name="date" required>

    <label for="until">End date <span style="font-weight:normal;font-size:12px">(optional — defaults to start date)</span></label>
    <input type="date" id="until" name="until">

    <a id="notes-toggle" onclick="toggleNotes()">+ Notes</a>
    <div id="notes-section">
      <label for="notes">Notes</label>
      <textarea id="notes" name="notes"></textarea>
    </div>

    <button type="submit" id="submit-btn">Upload</button>
  </form>

  <ul id="results"></ul>

  <hr class="section-divider">

  <h2>Upload Spec Tasks</h2>
  <form id="spec-form" onsubmit="submitSpec(event)">
    <label for="spec-start">Start date</label>
    <input type="date" id="spec-start" name="spec-start" required>

    <label for="spec-end">End date</label>
    <input type="date" id="spec-end" name="spec-end" required>

    <button type="submit" id="spec-submit-btn">Upload Spec</button>
  </form>
  <p id="spec-error"></p>

  <div id="spec-calendar"></div>

  <hr class="section-divider">

  <h2>Edit Spec Tasks</h2>
  <div id="csv-dirty-banner" style="display:none">Unsaved changes — save to persist edits.</div>
  <div id="csv-editor"></div>
  <div id="csv-add-row">
    <button id="csv-add-btn" onclick="csvAddItem()">+ Add Item</button>
  </div>
  <button id="csv-save-btn" onclick="csvSave()">Save to File</button>
  <p id="csv-save-status"></p>

  <script>
    // --- Put Task form ---
    document.getElementById('date').valueAsDate = new Date();

    function toggleNotes() {
      const section = document.getElementById('notes-section');
      const toggle = document.getElementById('notes-toggle');
      const hidden = section.style.display === 'none' || section.style.display === '';
      section.style.display = hidden ? 'block' : 'none';
      toggle.textContent = hidden ? '\u2212 Notes' : '+ Notes';
    }

    async function submitTask(event) {
      event.preventDefault();
      const name = document.getElementById('name').value.trim();
      const date = document.getElementById('date').value;
      const until = document.getElementById('until').value || null;
      const notes = document.getElementById('notes').value;
      const btn = document.getElementById('submit-btn');
      const resultsList = document.getElementById('results');

      btn.disabled = true;
      resultsList.innerHTML = '';
      resultsList.style.display = 'block';
      let hasError = false;

      const resp = await fetch('submit', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name, notes, date, until})
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({error: 'Unknown error'}));
        const li = document.createElement('li');
        li.textContent = 'Error: ' + err.error;
        li.className = 'error';
        resultsList.appendChild(li);
        btn.disabled = false;
        return;
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        buf += decoder.decode(value, {stream: true});
        const lines = buf.split('\n');
        buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = JSON.parse(line.slice(6));
          if (data.done) continue;
          const li = document.createElement('li');
          if (data.status === 'ok') {
            li.textContent = data.date + ' \u2713';
            li.className = 'ok';
          } else {
            li.textContent = data.date + ' \u2717 \u2014 ' + data.message;
            li.className = 'error';
            hasError = true;
          }
          resultsList.appendChild(li);
        }
      }

      btn.disabled = false;
      if (!hasError) {
        document.getElementById('task-form').reset();
        document.getElementById('date').valueAsDate = new Date();
        document.getElementById('notes-section').style.display = 'none';
        document.getElementById('notes-toggle').textContent = '+ Notes';
        setTimeout(() => { resultsList.innerHTML = ''; resultsList.style.display = 'none'; }, 2000);
      }
    }

    // --- Spec date helpers (match task-tools CLI quarter logic) ---

    function toISODate(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function firstSundayOnOrAfter(d) {
      const result = new Date(d);
      const day = result.getDay();
      if (day !== 0) result.setDate(result.getDate() + (7 - day));
      return result;
    }

    function firstSundayOfNthNextQuarter(n) {
      const today = new Date();
      const currentQuarter = Math.floor(today.getMonth() / 3);
      const targetQuarter = currentQuarter + n;
      const targetYear = today.getFullYear() + Math.floor(targetQuarter / 4);
      const targetMonth = (targetQuarter % 4) * 3;
      return firstSundayOnOrAfter(new Date(targetYear, targetMonth, 1));
    }

    document.getElementById('spec-start').value = toISODate(firstSundayOfNthNextQuarter(1));
    document.getElementById('spec-end').value = toISODate(firstSundayOfNthNextQuarter(2));

    // --- Calendar grid ---

    let calCells = {};

    function buildCalendar(startStr, endStr) {
      const cal = document.getElementById('spec-calendar');
      cal.innerHTML = '';
      cal.style.display = 'block';
      calCells = {};

      const start = new Date(startStr + 'T00:00:00');
      const end = new Date(endStr + 'T00:00:00');

      const grid = document.createElement('div');
      grid.className = 'cal-grid';

      ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d => {
        const h = document.createElement('div');
        h.className = 'cal-header';
        h.textContent = d;
        grid.appendChild(h);
      });

      // Pad to Monday before start, Sunday after end
      const startDay = start.getDay();
      const daysBackToMon = startDay === 0 ? 6 : startDay - 1;
      const gridStart = new Date(start);
      gridStart.setDate(start.getDate() - daysBackToMon);

      const endDay = end.getDay();
      const daysForwardToSun = endDay === 0 ? 0 : 7 - endDay;
      const gridEnd = new Date(end);
      gridEnd.setDate(end.getDate() + daysForwardToSun);

      let lastMonthLabel = null;
      let current = new Date(gridStart);

      while (current <= gridEnd) {
        if (current.getDay() === 1) {
          const monthStr = current.toLocaleString('default', {month: 'long', year: 'numeric'});
          if (monthStr !== lastMonthLabel) {
            const label = document.createElement('div');
            label.className = 'cal-month-label';
            label.textContent = monthStr;
            grid.appendChild(label);
            lastMonthLabel = monthStr;
          }
        }

        const dateStr = toISODate(current);
        const inRange = current >= start && current <= end;
        const cell = document.createElement('div');

        if (inRange) {
          cell.className = 'cal-cell';
          const dayNum = document.createElement('span');
          dayNum.className = 'day-num';
          dayNum.textContent = current.getDate();
          cell.appendChild(dayNum);
          calCells[dateStr] = cell;
        } else {
          cell.className = 'cal-cell out-of-range';
        }

        grid.appendChild(cell);
        current.setDate(current.getDate() + 1);
      }

      cal.appendChild(grid);
    }

    function updateCalendarCell(dateStr, status, tasks, message) {
      const cell = calCells[dateStr];
      if (!cell) return;
      cell.className = 'cal-cell ' + status;
      cell.innerHTML = '';
      const dayNum = document.createElement('span');
      dayNum.className = 'day-num';
      dayNum.textContent = parseInt(dateStr.slice(8), 10);
      cell.appendChild(dayNum);
      if (status === 'ok' && tasks && tasks.length > 0) {
        const badge = document.createElement('span');
        badge.className = 'badge';
        badge.textContent = tasks.length;
        cell.appendChild(badge);
      } else if (status === 'error') {
        if (message) cell.title = message;
        const badge = document.createElement('span');
        badge.className = 'badge';
        badge.textContent = '!';
        cell.appendChild(badge);
      }
    }

    // --- Spec form submission ---

    async function submitSpec(event) {
      event.preventDefault();
      const startDate = document.getElementById('spec-start').value;
      const endDate = document.getElementById('spec-end').value;
      const btn = document.getElementById('spec-submit-btn');
      const errEl = document.getElementById('spec-error');

      btn.disabled = true;
      errEl.style.display = 'none';
      buildCalendar(startDate, endDate);

      const resp = await fetch('spec-submit', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({start_date: startDate, end_date: endDate})
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({error: 'Unknown error'}));
        errEl.textContent = 'Error: ' + err.error;
        errEl.style.display = 'block';
        btn.disabled = false;
        return;
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        buf += decoder.decode(value, {stream: true});
        const lines = buf.split('\n');
        buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = JSON.parse(line.slice(6));
          if (data.done) continue;
          updateCalendarCell(data.date, data.status, data.tasks, data.message);
        }
      }

      btn.disabled = false;
    }

    // --- CSV Editor ---

    const CSV_LS_KEY = 'tasks_ui_spec_csv_edits';
    let csvItems = [];      // current editor state
    let csvDiskItems = [];  // last saved state from server

    const INTERVAL_LABELS = {d: 'Daily', w: 'Weekly', m: 'Monthly', q: 'Quarterly'};
    const INTERVAL_ORDER = ['d', 'w', 'm', 'q'];
    const DAY_OPTIONS = ['sun','mon','tue','wed','thu','fri','sat'];
    const DAY_LABELS  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    function csvDeepCopy(items) {
      return items.map(i => ({interval: i.interval, title: i.title, desc: i.desc}));
    }

    function csvItemsEqual(a, b) {
      if (a.length !== b.length) return false;
      for (let i = 0; i < a.length; i++) {
        if (a[i].interval !== b[i].interval || a[i].title !== b[i].title || a[i].desc !== b[i].desc) return false;
      }
      return true;
    }

    function csvRender() {
      const editor = document.getElementById('csv-editor');
      editor.innerHTML = '';

      // Group by interval preserving order within group
      const groups = {};
      INTERVAL_ORDER.forEach(k => { groups[k] = []; });
      csvItems.forEach((item, idx) => {
        const key = item.interval.split(':')[0];
        if (groups[key]) groups[key].push({item, idx});
      });

      INTERVAL_ORDER.forEach(key => {
        const entries = groups[key];
        if (entries.length === 0) return;
        const header = document.createElement('div');
        header.className = 'csv-group-header';
        header.textContent = INTERVAL_LABELS[key];
        editor.appendChild(header);

        entries.forEach(({item, idx}) => {
          const row = document.createElement('div');
          row.className = 'csv-item-row';

          const baseInterval = item.interval.split(':')[0];
          const dayPart = item.interval.includes(':') ? item.interval.split(':')[1] : (baseInterval === 'w' ? 'sun' : null);

          const sel = document.createElement('select');
          INTERVAL_ORDER.forEach(k => {
            const opt = document.createElement('option');
            opt.value = k;
            opt.textContent = INTERVAL_LABELS[k];
            if (k === baseInterval) opt.selected = true;
            sel.appendChild(opt);
          });
          sel.addEventListener('change', () => {
            csvItems[idx].interval = sel.value;
            csvOnChange();
            csvRender();  // re-render to move item to new group
          });

          const daySel = document.createElement('select');
          daySel.className = 'csv-day';
          DAY_OPTIONS.forEach((d, i) => {
            const opt = document.createElement('option');
            opt.value = d;
            opt.textContent = DAY_LABELS[i];
            if (d === dayPart) opt.selected = true;
            daySel.appendChild(opt);
          });
          if (baseInterval === 'w') {
            daySel.addEventListener('change', () => {
              const val = daySel.value;
              csvItems[idx].interval = (val === 'sun') ? 'w' : 'w:' + val;
              csvOnChange();
            });
          } else {
            daySel.disabled = true;
          }

          const titleInput = document.createElement('input');
          titleInput.type = 'text';
          titleInput.className = 'csv-title';
          titleInput.placeholder = 'Task title';
          titleInput.value = item.title;
          titleInput.addEventListener('input', () => {
            csvItems[idx].title = titleInput.value;
            csvOnChange();  // dirty check only, no re-render
          });

          const descInput = document.createElement('input');
          descInput.type = 'text';
          descInput.className = 'csv-desc';
          descInput.placeholder = 'Notes (optional)';
          descInput.value = item.desc;
          descInput.addEventListener('input', () => {
            csvItems[idx].desc = descInput.value;
            csvOnChange();  // dirty check only, no re-render
          });

          const delBtn = document.createElement('button');
          delBtn.className = 'csv-delete';
          delBtn.textContent = '\u00d7';
          delBtn.addEventListener('click', () => {
            csvItems.splice(idx, 1);
            csvOnChange();
            csvRender();  // re-render to remove the deleted row
          });

          row.appendChild(sel);
          row.appendChild(daySel);
          row.appendChild(titleInput);
          row.appendChild(descInput);
          row.appendChild(delBtn);
          editor.appendChild(row);
        });
      });
    }

    function csvOnChange() {
      const dirty = !csvItemsEqual(csvItems, csvDiskItems);
      document.getElementById('csv-dirty-banner').style.display = dirty ? 'block' : 'none';
      if (dirty) {
        localStorage.setItem(CSV_LS_KEY, JSON.stringify(csvItems));
      } else {
        localStorage.removeItem(CSV_LS_KEY);
      }
    }

    function csvAddItem() {
      csvItems.push({interval: 'w', title: '', desc: ''});
      csvOnChange();
      csvRender();
    }

    async function csvSave() {
      const btn = document.getElementById('csv-save-btn');
      const status = document.getElementById('csv-save-status');
      btn.disabled = true;
      status.textContent = '';
      try {
        const resp = await fetch('spec-csv', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({items: csvItems})
        });
        const result = await resp.json();
        if (!resp.ok) {
          status.textContent = 'Error: ' + (result.error || 'unknown');
        } else {
          csvDiskItems = csvDeepCopy(csvItems);
          localStorage.removeItem(CSV_LS_KEY);
          document.getElementById('csv-dirty-banner').style.display = 'none';
          csvRender();
          status.textContent = result.warning ? ('Saved. Warning: ' + result.warning) : 'Saved.';
          setTimeout(() => { status.textContent = ''; }, result.warning ? 6000 : 2000);
        }
      } catch (e) {
        status.textContent = 'Error: ' + e.message;
      }
      btn.disabled = false;
    }

    async function csvInit() {
      let diskItems = [];
      try {
        const resp = await fetch('spec-csv');
        if (!resp.ok) {
          document.getElementById('csv-save-status').textContent = 'Error loading CSV from server.';
          document.getElementById('csv-save-btn').disabled = true;
          return;
        }
        const data = await resp.json();
        diskItems = data.items || [];
      } catch (_) {
        document.getElementById('csv-save-status').textContent = 'Error loading CSV from server.';
        document.getElementById('csv-save-btn').disabled = true;
        return;
      }

      csvDiskItems = csvDeepCopy(diskItems);

      const lsRaw = localStorage.getItem(CSV_LS_KEY);
      if (lsRaw) {
        try {
          const lsItems = JSON.parse(lsRaw);
          if (!csvItemsEqual(lsItems, diskItems)) {
            csvItems = lsItems;
            document.getElementById('csv-dirty-banner').style.display = 'block';
            csvRender();
            return;
          }
        } catch (_) {}
      }

      csvItems = csvDeepCopy(diskItems);
      csvRender();
    }

    csvInit();
  </script>
</body>
</html>
