<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cozy</title>
    <link rel="icon" href="{{ urlroot }}static/tv.svg" type="image/svg+xml" />
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #4e73df 0%, #224abe 100%);
            min-height: 100vh; display: flex; align-items: flex-start; justify-content: center;
        }
        .card { background:#fff; width:100%; max-width:640px; margin:40px 20px; padding:32px; border-radius:16px; box-shadow:0 10px 40px rgba(0,0,0,0.2); }
        .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
        h1 { color:#4e73df; margin:0; font-size:1.6rem; font-weight:700; }
        a.logout { color:#4e73df; text-decoration:none; font-weight:600; }
        label { display:block; font-weight:600; margin:16px 0 8px; color:#495057; }
        select, textarea, input[type="number"] {
            width:100%; padding:12px 14px; font-size:1rem; border:2px solid #ced4da; border-radius:8px; font-family:inherit;
        }
        select:focus, textarea:focus, input:focus { outline:none; border-color:#4e73df; box-shadow:0 0 0 3px rgba(78,115,223,0.15); }
        textarea { min-height:90px; resize:vertical; }
        .dims { display:flex; gap:16px; }
        .dims > div { flex:1; }
        button {
            margin-top:20px; width:100%; padding:14px 24px; font-size:1.05rem; font-weight:600; color:#fff;
            background:linear-gradient(135deg,#4e73df 0%,#224abe 100%); border:none; border-radius:8px; cursor:pointer;
            box-shadow:0 4px 12px rgba(78,115,223,0.3);
        }
        button:disabled { opacity:0.5; cursor:not-allowed; }
        button.clear { background:#6c757d; box-shadow:none; }
        button.restart { background:#e74a3b; box-shadow:none; }
        button.flush { background:#36b9cc; box-shadow:none; }
        .restart-row { margin-top:32px; padding-top:20px; border-top:1px solid #e9ecef; }
        .restart-row button { margin-top:0; }
        .flush-row { margin-top:16px; }
        .flush-row button { margin-top:0; }
        .prompt-actions { display:flex; gap:8px; margin-top:6px; }
        button.secondary {
            margin-top:0; width:auto; padding:6px 14px; font-size:0.85rem; font-weight:600;
            color:#4e73df; background:#fff; border:2px solid #4e73df; border-radius:6px;
            cursor:pointer; box-shadow:none;
        }
        button.secondary:hover { background:#f0f4ff; }
        button.secondary:disabled { opacity:0.5; cursor:not-allowed; }
        .progress { margin-top:20px; height:18px; background:#e9ecef; border-radius:9px; overflow:hidden; display:none; }
        .progress > div { height:100%; width:0%; background:linear-gradient(135deg,#4e73df,#224abe); transition:width 0.3s; }
        .error { color:#721c24; background:#f8d7da; border:2px solid #f5c6cb; padding:10px 14px; border-radius:6px; margin-top:16px; display:none; }
        .duration { margin-top:16px; text-align:center; color:#495057; font-weight:600; display:none; }
        #output { margin-top:24px; text-align:center; }
        #output img { max-width:100%; border-radius:8px; }
        #hidden-inputs { display:none; }
        .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:10; }
        .modal { background:#fff; width:90%; max-width:520px; max-height:85vh; overflow:auto; border-radius:12px; padding:20px; }
        .modal-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
        .modal-row input[type="text"] { flex:1; padding:8px 10px; font-size:0.95rem; border:2px solid #ced4da; border-radius:6px; }
        #modal-path { font-size:0.85rem; color:#495057; word-break:break-all; margin-bottom:8px; }
        #modal-list { list-style:none; margin:8px 0; padding:0; max-height:40vh; overflow:auto; border:1px solid #e9ecef; border-radius:6px; }
        #modal-list li { padding:8px 12px; cursor:pointer; border-bottom:1px solid #f1f3f5; }
        #modal-list li:hover { background:#f0f4ff; }
        #modal-list li.b-picked { background:#e2eaff; }
        details#pdb { margin-top:16px; }
        details#pdb summary { font-weight:600; color:#495057; cursor:pointer; }
        .pdb-row { display:flex; gap:8px; margin-top:8px; }
        .pdb-row select { flex:1; }
        .pdb-row input[type="text"] { flex:1; padding:8px 10px; font-size:0.95rem; border:2px solid #ced4da; border-radius:6px; }
        .pdb-path { font-size:0.85rem; color:#495057; margin-top:6px; word-break:break-all; }
        .tabs { display:flex; gap:8px; margin-bottom:16px; }
        .tab { margin-top:0; width:auto; flex:1; padding:10px; background:#e9ecef; color:#495057; box-shadow:none; }
        .tab.active { background:linear-gradient(135deg,#4e73df 0%,#224abe 100%); color:#fff; }
        .eta { margin-top:8px; text-align:center; color:#4e73df; font-weight:600; display:none; }
        .q-list { list-style:none; margin:8px 0; padding:0; }
        .q-list li { display:flex; align-items:center; gap:8px; padding:8px 10px; border:1px solid #e9ecef; border-radius:6px; margin-bottom:6px; }
        .q-list li .q-meta { flex:1; font-size:0.9rem; }
        .q-list li .q-eta { color:#4e73df; font-weight:600; font-size:0.85rem; }
        .q-list li button { margin-top:0; width:auto; padding:4px 10px; background:#6c757d; box-shadow:none; }
        .q-total { margin:12px 0; text-align:center; font-weight:700; color:#224abe; }
        .q-results { display:flex; flex-wrap:wrap; gap:10px; margin:8px 0; }
        .q-results figure { margin:0; width:120px; text-align:center; font-size:0.8rem; }
        .q-results img { width:120px; border-radius:6px; cursor:pointer; }
        .q-results .failed { color:#721c24; }
        #q-bar { height:100%; width:0%; background:linear-gradient(135deg,#4e73df,#224abe); transition:width 0.3s; }
    </style>
</head>

<body>
    <div class="card">
        <div class="topbar">
            <h1>cozy</h1>
            <a class="logout" href="{{ urlroot }}logout">Log out</a>
        </div>

        {% if has_queue %}
        <div class="tabs">
            <button type="button" class="tab active" id="tab-single">Single</button>
            <button type="button" class="tab" id="tab-queue">Queue</button>
        </div>
        {% endif %}
        <div id="single-view">
        <label for="workflow">Workflow</label>
        <select id="workflow">
            {% for w in workflows %}
            <option value="{{ w }}" {% if state.workflow == w %}selected{% endif %}>{{ w }}</option>
            {% endfor %}
        </select>

        <div id="inputs">
            <div id="image-picker" style="display:none;">
                <label for="image-select">Input image</label>
                <select id="image-select"></select>
                <div class="prompt-actions">
                    <button type="button" class="secondary" id="remote-image-btn">Remote&hellip;</button>
                </div>
                <div class="pdb-path" id="remote-image-label" style="display:none;"></div>
                <div id="preview-wrap" style="margin-top:12px; display:none;">
                    <img id="preview" alt="input preview" style="max-width:100%; border-radius:8px;" />
                </div>
            </div>
            <label for="prompt" id="prompt-label">Prompt</label>
            <textarea id="prompt">{{ state.prompt }}</textarea>
            <div class="prompt-actions">
                <button type="button" class="secondary" id="copy-btn" aria-label="Copy prompt to clipboard">&#128203; Copy</button>
                <button type="button" class="secondary" id="paste-btn" aria-label="Paste clipboard text into prompt">&#128203; Paste</button>
                <button type="button" class="secondary" id="clear-text-btn" aria-label="Clear prompt text">&#10006; Clear text</button>
            </div>
            <details id="pdb">
                <summary>Prompt library</summary>
                <div class="pdb-path" id="pdb-path"></div>
                <div class="pdb-row">
                    <select id="pdb-select"></select>
                    <button type="button" class="secondary" id="pdb-browse">Browse&hellip;</button>
                </div>
                <div class="pdb-row">
                    <input type="text" id="pdb-filter" placeholder="filter prompts" />
                </div>
                <div class="prompt-actions">
                    <button type="button" class="secondary" id="pdb-load">Load</button>
                    <button type="button" class="secondary" id="pdb-save">Save</button>
                    <button type="button" class="secondary" id="pdb-saveas">Save as&hellip;</button>
                    <button type="button" class="secondary" id="pdb-delete">Delete</button>
                </div>
            </details>
            <div class="dims">
                <div>
                    <label for="width">Width</label>
                    <input type="number" id="width" min="1" value="{{ state.width }}" />
                </div>
                <div>
                    <label for="height">Height</label>
                    <input type="number" id="height" min="1" value="{{ state.height }}" />
                </div>
            </div>
            <button id="generate">Generate</button>
        </div>

        <div class="progress" id="progress"><div id="bar"></div></div>
        <div class="eta" id="eta"></div>
        <div class="error" id="error"></div>
        <div class="duration" id="duration"></div>

        <div id="output"></div>
        <button class="clear" id="clear">Clear</button>

        {% if can_restart %}
        <div class="restart-row">
            <button class="restart" id="restart">Restart ComfyUI</button>
        </div>
        {% endif %}

        <div class="flush-row">
            <button class="flush" id="flush">Flush</button>
        </div>
        </div><!-- /single-view -->
        {% if has_queue %}
        <div id="queue-view" style="display:none;">
            <label>Pending</label>
            <ul id="q-pending" class="q-list"></ul>
            <button type="button" class="secondary" id="q-add">+ Add current settings as job</button>

            <div id="q-running" style="display:none;">
                <label>Running</label>
                <div id="q-running-label"></div>
                <div class="progress" style="display:block;"><div id="q-bar"></div></div>
                <div class="eta" id="q-running-eta" style="display:block;"></div>
            </div>
            <div class="eta" id="q-gap" style="display:none;"></div>

            <div class="q-total" id="q-total"></div>
            <div class="prompt-actions">
                <button type="button" class="secondary" id="q-start">Start queue</button>
                <button type="button" class="secondary" id="q-stop">Stop</button>
            </div>

            <label>Results</label>
            <div id="q-results" class="q-results"></div>
            <button type="button" class="secondary" id="q-clear">Clear results</button>
        </div>
        {% endif %}
    </div>

    <div class="modal-backdrop" id="modal-backdrop" style="display:none;">
        <div class="modal">
            <div class="modal-row">
                <input type="text" id="modal-host" list="known-hosts" placeholder="hostname (empty = local)" />
                <datalist id="known-hosts"></datalist>
                <button type="button" class="secondary" id="modal-go">Go</button>
                <button type="button" class="secondary" id="modal-close">Close</button>
            </div>
            <div id="modal-path"></div>
            <div class="modal-row">
                <button type="button" class="secondary" id="modal-up">&#8679; Up</button>
                <input type="text" id="modal-filter" placeholder="filter" />
            </div>
            <ul id="modal-list"></ul>
            <div id="modal-preview-wrap" style="display:none;"><img id="modal-preview" alt="preview" style="max-width:100%; border-radius:8px;" /></div>
            <button type="button" id="modal-select">Select this directory</button>
        </div>
    </div>

    <script>
        const root = "{{ urlroot }}";
        const WORKFLOW_KINDS = {{ workflow_kinds | tojson }};
        const initialImage = {{ state.image | tojson }};
        const KNOWN_HOSTS = {{ state.known_hosts | tojson }};
        let IMAGE_SRC = {{ state.image_src | tojson }};
        const workflowSel = document.getElementById("workflow");
        const imagePicker = document.getElementById("image-picker");
        const imageSelect = document.getElementById("image-select");
        const previewWrap = document.getElementById("preview-wrap");
        const preview = document.getElementById("preview");
        const dimsRow = document.querySelector(".dims");
        const promptLabel = document.getElementById("prompt-label");

        function currentKind() { return WORKFLOW_KINDS[workflowSel.value] || "generate"; }

        function updatePreview() {
            const name = imageSelect.value;
            if (name) {
                preview.src = root + "api/input-image?name=" + encodeURIComponent(name) + "&t=" + Date.now();
                previewWrap.style.display = "block";
            } else {
                preview.removeAttribute("src");
                previewWrap.style.display = "none";
            }
        }

        function escAttr(s) {
            return String(s).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;");
        }
        function escHtml(s) {
            return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        async function loadInputImages() {
            const r = await fetch(root + "api/input-images");
            // Each item: {value, label, source}. `value` is the LoadImage string
            // (bare path for input-dir files, "<path> [output]" for output-dir
            // files); group by source so the dropdown separates Input from Output.
            const items = (await r.json()).images || [];
            const groups = { input: [], output: [] };
            items.forEach(it => (groups[it.source] || (groups[it.source] = [])).push(it));
            const opts = (gs) => gs.map(it =>
                '<option value="' + escAttr(it.value) + '">' + escHtml(it.label) + '</option>').join("");
            let html = '<option value="">— choose an image —</option>';
            [["input", "Input"], ["output", "Output"]].forEach(([key, label]) => {
                const gs = groups[key] || [];
                if (gs.length) html += '<optgroup label="' + label + '">' + opts(gs) + '</optgroup>';
            });
            imageSelect.innerHTML = html;
            if (initialImage) imageSelect.value = initialImage;
            updatePreview();
        }

        function applyKind() {
            const edit = currentKind() === "edit";
            imagePicker.style.display = edit ? "block" : "none";
            dimsRow.style.display = edit ? "none" : "flex";
            promptLabel.textContent = edit ? "Edit instruction" : "Prompt";
            if (edit && !imageSelect.options.length) loadInputImages();
        }

        workflowSel.addEventListener("change", applyKind);
        imageSelect.addEventListener("change", () => {
            if (imageSelect.value) { clearRemoteImage(); }
            updatePreview();
        });
        const bar = document.getElementById("bar");
        const progress = document.getElementById("progress");
        const errorBox = document.getElementById("error");
        const durationBox = document.getElementById("duration");
        const etaBox = document.getElementById("eta");
        const genBtn = document.getElementById("generate");
        const output = document.getElementById("output");
        let polling = null;

        function showError(msg) { errorBox.textContent = msg; errorBox.style.display = msg ? "block" : "none"; }

        // secs -> "45s" or "1m 23s"; null/undefined clears the line.
        function formatDuration(secs) {
            if (secs == null) return "";
            secs = Math.round(secs);
            if (secs < 60) return secs + "s";
            const m = Math.floor(secs / 60), s = secs % 60;
            return m + "m " + (s < 10 ? "0" + s : s) + "s";
        }

        function showDuration(secs) {
            const t = formatDuration(secs);
            durationBox.textContent = t ? "Generated in " + t : "";
            durationBox.style.display = t ? "block" : "none";
        }

        function showEta(secs) {
            const t = (secs == null) ? "" : formatDuration(secs);
            etaBox.textContent = t ? "~" + t + " remaining" : "";
            etaBox.style.display = t ? "block" : "none";
        }

        function setRunning(on) {
            genBtn.disabled = on;
            progress.style.display = on ? "block" : "none";
        }

        function showImage() {
            output.innerHTML = '<img src="' + root + 'api/image?t=' + Date.now() + '" alt="output" />';
        }

        async function poll() {
            const r = await fetch(root + "api/status");
            const s = await r.json();
            if (s.status === "running") {
                setRunning(true);
                bar.style.width = (s.progress || 0) + "%";
                showEta(s.eta);
            } else {
                setRunning(false);
                showEta(null);
                if (polling) { clearInterval(polling); polling = null; }
                if (s.status === "failed") showError(s.error || "generation failed");
                else showError("");
                if (s.has_image) { showImage(); showDuration(s.duration); }
            }
        }

        function startPolling() {
            if (!polling) polling = setInterval(poll, 1000);
            poll();
        }

        document.getElementById("generate").addEventListener("click", async () => {
            showError("");
            showDuration(null);
            output.innerHTML = "";
            const payload = {
                workflow: document.getElementById("workflow").value,
                prompt: document.getElementById("prompt").value,
                width: parseInt(document.getElementById("width").value, 10),
                height: parseInt(document.getElementById("height").value, 10),
            };
            if (currentKind() === "edit") {
                if (remoteImage) payload.remote_image = remoteImage;
                else payload.image = imageSelect.value;
            }
            const r = await fetch(root + "api/generate", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
            });
            if (!r.ok) { const e = await r.json(); showError(e.error || "error"); return; }
            setRunning(true); bar.style.width = "0%"; startPolling();
        });

        document.getElementById("clear").addEventListener("click", async () => {
            await fetch(root + "api/clear", { method: "POST" });
            document.getElementById("prompt").value = "";
            imageSelect.value = ""; clearRemoteImage(); updatePreview();
            IMAGE_SRC = null;  // Clear also forgets the remembered remote source dir
            output.innerHTML = ""; showError(""); showDuration(null); bar.style.width = "0%";
            // The server reset the prompt-DB selection too; re-sync the
            // library panel if it has been opened.
            if (pdbLoaded) { pdbHost = ""; refreshPdb(); }
        });

        const restartBtn = document.getElementById("restart");
        if (restartBtn) {
            restartBtn.addEventListener("click", async () => {
                if (!confirm("Restart the ComfyUI service? Any in-progress generation will be interrupted.")) return;
                showError("");
                const orig = restartBtn.textContent;
                restartBtn.disabled = true;
                restartBtn.textContent = "Restarting…";
                try {
                    const r = await fetch(root + "api/restart-comfyui", { method: "POST" });
                    const d = await r.json().catch(() => ({}));
                    if (!r.ok) showError(d.error || "restart failed");
                    else { restartBtn.textContent = "✓ Restarted"; }
                } catch (e) {
                    showError("restart failed: " + e.message);
                } finally {
                    setTimeout(() => { restartBtn.textContent = orig; restartBtn.disabled = false; }, 1500);
                }
            });
        }

        const flushBtn = document.getElementById("flush");
        flushBtn.addEventListener("click", async () => {
            if (!confirm("Flush the input and output directories?")) return;
            showError("");
            const orig = flushBtn.textContent;
            flushBtn.disabled = true;
            flushBtn.textContent = "Flushing…";
            try {
                const r = await fetch(root + "api/flush", { method: "POST" });
                const d = await r.json().catch(() => ({}));
                if (!r.ok) showError(d.error || "flush failed");
                else flushBtn.textContent = d.ran ? "✓ Flushed" : "Nothing to flush";
            } catch (e) {
                showError("flush failed: " + e.message);
            } finally {
                setTimeout(() => { flushBtn.textContent = orig; flushBtn.disabled = false; }, 1500);
            }
        });

        // --- Copy / Paste prompt helpers ---
        const copyBtn = document.getElementById("copy-btn");
        const pasteBtn = document.getElementById("paste-btn");
        const promptTA = document.getElementById("prompt");

        function flashCopied() {
            const orig = copyBtn.innerHTML;
            copyBtn.innerHTML = "&#10003; Copied!";
            copyBtn.disabled = true;
            setTimeout(() => { copyBtn.innerHTML = orig; copyBtn.disabled = false; }, 1200);
        }

        // Legacy execCommand copy. Must run synchronously inside the click
        // gesture. iOS Safari ignores textarea.select(), so build an explicit
        // Range/Selection and setSelectionRange after temporarily clearing
        // readOnly/enabling contentEditable, or nothing gets selected and the
        // copy silently no-ops.
        function legacyCopy(el, text) {
            const prevReadOnly = el.readOnly, prevCE = el.contentEditable;
            el.readOnly = false;
            el.contentEditable = "true";
            const range = document.createRange();
            range.selectNodeContents(el);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
            el.setSelectionRange(0, text.length);
            let ok = false;
            try { ok = document.execCommand("copy"); } catch (_) { ok = false; }
            el.readOnly = prevReadOnly;
            el.contentEditable = prevCE;
            sel.removeAllRanges();
            return ok;
        }

        copyBtn.addEventListener("click", () => {
            const text = promptTA.value;
            // navigator.clipboard exists only in a secure context (HTTPS). cozy
            // is served over plain HTTP on the LAN, so on iOS Safari it is
            // undefined and we must take the legacy path synchronously — an
            // awaited rejection would run the fallback after the user gesture
            // has expired, which iOS blocks.
            if (window.isSecureContext && navigator.clipboard) {
                navigator.clipboard.writeText(text)
                    .then(flashCopied)
                    .catch(() => { if (legacyCopy(promptTA, text)) flashCopied(); });
            } else if (legacyCopy(promptTA, text)) {
                flashCopied();
            } else {
                showError("Copy not supported here — long-press the prompt text and choose Copy.");
            }
        });

        document.getElementById("clear-text-btn").addEventListener("click", () => {
            promptTA.value = "";
            promptTA.focus();
        });

        // Paste replaces the entire textarea value with clipboard content.
        // Replacing is simpler and avoids cursor-position maths; consistent with
        // how mobile "Select All → Paste" works when starting a new prompt.
        pasteBtn.addEventListener("click", async () => {
            try {
                const text = await navigator.clipboard.readText();
                promptTA.value = text;
                promptTA.focus();
            } catch (_) {
                // readText() is unavailable (e.g. Firefox without permission, some
                // mobile browsers). Guide the user to paste manually.
                promptTA.focus();
                showError("Clipboard read not supported — please use Ctrl/Cmd+V (desktop) or long-press → Paste (mobile) to paste into the prompt field.");
            }
        });

        // --- Shared local/remote directory browser modal ---
        const modalBackdrop = document.getElementById("modal-backdrop");
        const modalHost = document.getElementById("modal-host");
        const modalPathEl = document.getElementById("modal-path");
        const modalFilter = document.getElementById("modal-filter");
        const modalList = document.getElementById("modal-list");
        const modalSelectBtn = document.getElementById("modal-select");
        const modalPreviewWrap = document.getElementById("modal-preview-wrap");
        const modalPreview = document.getElementById("modal-preview");
        let browser = null; // {mode, path, entries, picked, onPick}

        function renderKnownHosts() {
            document.getElementById("known-hosts").innerHTML =
                KNOWN_HOSTS.map(h => '<option value="' + escAttr(h) + '">').join("");
        }

        function rememberHost(h) {
            if (h && !KNOWN_HOSTS.includes(h)) { KNOWN_HOSTS.push(h); renderKnownHosts(); }
        }

        // mode "dir": pick a directory. mode "img": pick an image file (with preview).
        function openBrowser(host, mode, startPath, onPick) {
            browser = { mode: mode, onPick: onPick, path: "", entries: [], picked: null };
            modalHost.value = host || "";
            modalSelectBtn.textContent = mode === "img" ? "Use this image" : "Select this directory";
            modalFilter.value = "";
            modalBackdrop.style.display = "flex";
            browseTo(startPath || "");
        }

        async function browseTo(path) {
            const q = "host=" + encodeURIComponent(modalHost.value.trim()) +
                      "&path=" + encodeURIComponent(path) +
                      (browser.mode === "img" ? "&files=img" : "");
            let d;
            try {
                const r = await fetch(root + "api/browse?" + q);
                d = await r.json();
                if (!r.ok) { showError(d.error || "browse failed"); return; }
            } catch (e) { showError("browse failed: " + e.message); return; }
            showError("");
            browser.path = d.path;
            browser.picked = null;
            browser.entries = (d.dirs || []).map(n => ({ name: n, dir: true }))
                .concat((d.files || []).map(n => ({ name: n, dir: false })));
            modalPreviewWrap.style.display = "none";
            modalSelectBtn.disabled = browser.mode === "img";
            modalPathEl.textContent = d.path;
            renderBrowser();
        }

        function joinPath(a, b) { return a.replace(/\/+$/, "") + "/" + b; }
        function parentPath(p) {
            const q = p.replace(/\/+$/, "");
            const i = q.lastIndexOf("/");
            return i > 0 ? q.slice(0, i) : "/";
        }

        function renderBrowser() {
            const f = modalFilter.value.toLowerCase();
            modalList.innerHTML = "";
            browser.entries
                .filter(e => !f || e.name.toLowerCase().includes(f))
                .forEach(e => {
                    const li = document.createElement("li");
                    li.textContent = (e.dir ? "📁 " : "🖼 ") + e.name;
                    li.addEventListener("click", () => {
                        if (e.dir) { browseTo(joinPath(browser.path, e.name)); return; }
                        browser.picked = joinPath(browser.path, e.name);
                        [...modalList.children].forEach(c => c.classList.remove("b-picked"));
                        li.classList.add("b-picked");
                        modalPreview.src = root + "api/remote-image?host=" +
                            encodeURIComponent(modalHost.value.trim()) +
                            "&path=" + encodeURIComponent(browser.picked) + "&t=" + Date.now();
                        modalPreviewWrap.style.display = "block";
                        modalSelectBtn.disabled = false;
                    });
                    modalList.appendChild(li);
                });
        }

        document.getElementById("modal-go").addEventListener("click", () => browseTo(""));
        document.getElementById("modal-up").addEventListener("click", () => browseTo(parentPath(browser.path)));
        document.getElementById("modal-close").addEventListener("click", () => { modalBackdrop.style.display = "none"; });
        modalFilter.addEventListener("input", renderBrowser);
        modalSelectBtn.addEventListener("click", () => {
            const res = browser.mode === "img" ? browser.picked : browser.path;
            modalBackdrop.style.display = "none";
            rememberHost(modalHost.value.trim());
            browser.onPick(modalHost.value.trim(), res);
        });

        // --- Prompt library ---
        const pdbDetails = document.getElementById("pdb");
        const pdbPathEl = document.getElementById("pdb-path");
        const pdbSelect = document.getElementById("pdb-select");
        const pdbFilter = document.getElementById("pdb-filter");
        let pdbPrompts = [];
        let pdbHost = "";
        let pdbLoaded = false;

        function renderPdbPrompts() {
            const f = pdbFilter.value.toLowerCase();
            pdbSelect.innerHTML = pdbPrompts
                .filter(n => !f || n.toLowerCase().includes(f))
                .map(n => '<option value="' + escAttr(n) + '">' + escHtml(n) + '</option>')
                .join("");
        }

        async function refreshPdb() {
            let d;
            try {
                const r = await fetch(root + "api/pdb/prompts");
                d = await r.json();
                if (!r.ok) {
                    pdbPathEl.textContent = "⚠ " + (d.error || "prompt database unavailable");
                    pdbPrompts = []; renderPdbPrompts(); return;
                }
            } catch (e) { pdbPathEl.textContent = "⚠ " + e.message; return; }
            pdbHost = d.db.host;
            pdbPathEl.textContent = (d.db.host ? d.db.host + ":" : "") + d.db.path;
            pdbPrompts = d.prompts;
            renderPdbPrompts();
        }

        pdbDetails.addEventListener("toggle", () => {
            if (pdbDetails.open && !pdbLoaded) { pdbLoaded = true; renderKnownHosts(); refreshPdb(); }
        });

        document.getElementById("pdb-browse").addEventListener("click", () => {
            openBrowser(pdbHost, "dir", "", async (host, path) => {
                const r = await fetch(root + "api/pdb/select", {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ host: host, path: path }),
                });
                if (!r.ok) { const d = await r.json().catch(() => ({})); showError(d.error || "select failed"); return; }
                refreshPdb();
            });
        });

        document.getElementById("pdb-load").addEventListener("click", async () => {
            if (!pdbSelect.value) return;
            const r = await fetch(root + "api/pdb/prompt?name=" + encodeURIComponent(pdbSelect.value));
            const d = await r.json();
            if (!r.ok) { showError(d.error || "load failed"); return; }
            promptTA.value = d.text;
        });

        async function savePrompt(name) {
            const r = await fetch(root + "api/pdb/prompt", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name: name, text: promptTA.value }),
            });
            if (!r.ok) { const d = await r.json().catch(() => ({})); showError(d.error || "save failed"); return; }
            refreshPdb();
        }

        document.getElementById("pdb-save").addEventListener("click", () => {
            if (pdbSelect.value) savePrompt(pdbSelect.value);
        });
        document.getElementById("pdb-saveas").addEventListener("click", () => {
            const name = prompt("Prompt name:");
            if (name && name.trim()) savePrompt(name.trim());
        });
        document.getElementById("pdb-delete").addEventListener("click", async () => {
            if (!pdbSelect.value) return;
            if (!confirm('Delete prompt "' + pdbSelect.value + '"?')) return;
            const r = await fetch(root + "api/pdb/delete", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name: pdbSelect.value }),
            });
            if (!r.ok) { const d = await r.json().catch(() => ({})); showError(d.error || "delete failed"); return; }
            refreshPdb();
        });
        pdbFilter.addEventListener("input", renderPdbPrompts);

        // --- Remote input image (edit workflows) ---
        let remoteImage = null; // {host, path} or null
        const remoteImageBtn = document.getElementById("remote-image-btn");
        const remoteImageLabel = document.getElementById("remote-image-label");

        function clearRemoteImage() {
            remoteImage = null;
            remoteImageLabel.textContent = "";
            remoteImageLabel.style.display = "none";
        }

        function setRemoteImage(host, path) {
            if (!path) { clearRemoteImage(); updatePreview(); return; }
            remoteImage = { host: host, path: path };
            remoteImageLabel.textContent = (host ? host + ":" : "") + path;
            remoteImageLabel.style.display = "block";
            imageSelect.value = "";
            preview.src = root + "api/remote-image?host=" + encodeURIComponent(host) +
                "&path=" + encodeURIComponent(path) + "&t=" + Date.now();
            previewWrap.style.display = "block";
        }

        // Remember the host + source directory a remote image was picked from,
        // so the picker reopens there next time. Persisted server-side (survives
        // reload) until the Clear button resets it.
        function rememberImageSrc(host, path) {
            IMAGE_SRC = { host: host, path: parentPath(path) };
            fetch(root + "api/image-src", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ host: host, path: IMAGE_SRC.path }),
            });
        }

        remoteImageBtn.addEventListener("click", () => {
            openBrowser((IMAGE_SRC && IMAGE_SRC.host) || "", "img",
                        (IMAGE_SRC && IMAGE_SRC.path) || "",
                        (h, p) => { rememberImageSrc(h, p); setRemoteImage(h, p); });
        });

        // Restore state on load: show image if present, resume polling if running.
        (function init() {
            const st = {{ state.job | tojson }};
            const hasImage = {{ (state.output) | tojson }};
            if (st.status === "running") { startPolling(); }
            else if (st.status === "failed") { showError(st.error || "generation failed"); }
            if (hasImage) { showImage(); showDuration(st.duration); }
            applyKind();
        })();

        const tabSingle = document.getElementById("tab-single");
        const tabQueue = document.getElementById("tab-queue");
        const singleView = document.getElementById("single-view");
        const queueView = document.getElementById("queue-view");
        let queuePoll = null;
        function startQueuePolling() {
            if (!queuePoll) queuePoll = setInterval(refreshQueue, 1000);
            refreshQueue();
        }
        function stopQueuePolling() {
            if (queuePoll) { clearInterval(queuePoll); queuePoll = null; }
        }

        function currentJobPayload() {
            const payload = {
                workflow: workflowSel.value,
                prompt: document.getElementById("prompt").value,
                width: parseInt(document.getElementById("width").value, 10),
                height: parseInt(document.getElementById("height").value, 10),
            };
            if (currentKind() === "edit") {
                if (remoteImage) payload.remote_image = remoteImage;
                else payload.image = imageSelect.value;
            }
            return payload;
        }

        async function refreshQueue() {
            let s;
            try {
                const r = await fetch(root + "api/queue/status");
                if (!r.ok) return;
                s = await r.json();
            } catch (e) { return; }
            const pend = document.getElementById("q-pending");
            pend.innerHTML = "";
            s.jobs.forEach((j, i) => {
                const li = document.createElement("li");
                const meta = document.createElement("div");
                meta.className = "q-meta";
                meta.textContent = (i + 1) + ". " + j.workflow + "  " +
                    (j.kind === "edit" ? "(edit)" : (j.width + "x" + j.height)) +
                    "  “" + (j.prompt || "").slice(0, 30) + "”";
                const eta = document.createElement("span");
                eta.className = "q-eta";
                eta.textContent = j.eta == null ? "" : "~" + formatDuration(j.eta);
                const rm = document.createElement("button");
                rm.textContent = "✖";
                rm.addEventListener("click", async () => {
                    await fetch(root + "api/queue/remove", {
                        method: "POST", headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ id: j.id }) });
                    refreshQueue();
                });
                li.append(meta, eta, rm);
                pend.appendChild(li);
            });
            const running = document.getElementById("q-running");
            const gap = document.getElementById("q-gap");
            if (s.current) {
                running.style.display = "block";
                document.getElementById("q-running-label").textContent =
                    s.current.workflow + "  “" + (s.current.prompt || "").slice(0, 30) + "”";
                document.getElementById("q-bar").style.width = (s.current.progress || 0) + "%";
                document.getElementById("q-running-eta").textContent =
                    s.current.eta == null ? "" : "~" + formatDuration(s.current.eta) + " remaining";
            } else {
                running.style.display = "none";
            }
            if (s.gap_until && !s.current) {
                gap.style.display = "block";
                gap.textContent = "Resting before next job…";
            } else {
                gap.style.display = "none";
            }
            document.getElementById("q-total").textContent =
                s.total_eta == null ? "" : "Total remaining: ~" + formatDuration(s.total_eta);
            renderResults(s.results);
        }

        // Result images live at immutable, id-based paths, so their URLs are
        // stable (no cache-buster). Only rebuild the gallery when the result
        // set actually changes; otherwise leave the already-loaded thumbnails
        // in place so they persist across the 1s poll instead of reloading.
        let lastResultsSig = null;
        function renderResults(results) {
            const sig = results.map(j => j.id + ":" + (j.has_image ? 1 : 0) + ":" + j.status).join(",");
            if (sig === lastResultsSig) return;
            lastResultsSig = sig;
            const res = document.getElementById("q-results");
            res.innerHTML = "";
            results.forEach(j => {
                const fig = document.createElement("figure");
                if (j.has_image) {
                    const img = document.createElement("img");
                    img.src = root + "api/queue/image?id=" + encodeURIComponent(j.id);
                    img.addEventListener("click", () => window.open(img.src, "_blank"));
                    fig.appendChild(img);
                }
                const cap = document.createElement("figcaption");
                if (j.status === "failed") {
                    cap.className = "failed";
                    cap.textContent = j.workflow + " FAILED: " + (j.error || "error");
                } else {
                    cap.textContent = j.workflow + "  " + formatDuration(j.duration);
                }
                fig.appendChild(cap);
                res.appendChild(fig);
            });
        }

        const qAdd = document.getElementById("q-add");
        if (qAdd) {
            qAdd.addEventListener("click", async () => {
                showError("");
                const r = await fetch(root + "api/queue/add", {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(currentJobPayload()) });
                if (!r.ok) { const e = await r.json().catch(() => ({})); showError(e.error || "add failed"); return; }
                refreshQueue();
            });
            document.getElementById("q-start").addEventListener("click", async () => {
                showError("");
                const r = await fetch(root + "api/queue/start", { method: "POST" });
                if (r.status === 409) { showError("Busy — a single job is running."); return; }
                refreshQueue();
            });
            document.getElementById("q-stop").addEventListener("click", async () => {
                await fetch(root + "api/queue/stop", { method: "POST" });
                refreshQueue();
            });
            document.getElementById("q-clear").addEventListener("click", async () => {
                await fetch(root + "api/queue/clear", { method: "POST" });
                refreshQueue();
            });
        }
        if (tabSingle) {
            function showTab(which) {
                const q = which === "queue";
                singleView.style.display = q ? "none" : "block";
                queueView.style.display = q ? "block" : "none";
                tabQueue.classList.toggle("active", q);
                tabSingle.classList.toggle("active", !q);
                if (q) startQueuePolling(); else stopQueuePolling();
            }
            tabSingle.addEventListener("click", () => showTab("single"));
            tabQueue.addEventListener("click", () => showTab("queue"));
        }
    </script>
</body>

</html>
