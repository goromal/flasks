<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tester{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{{ urlroot }}favicon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f0f2f5;
            color: #333;
            min-height: 100vh;
        }

        .topbar {
            background: #2c3e50;
            color: white;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .topbar-title {
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.2em;
            letter-spacing: 0.5px;
        }

        .topbar-title:hover { color: #3498db; }

        .topbar-nav {
            margin-left: auto;
            display: flex;
            gap: 16px;
        }

        .topbar-nav a {
            color: #bdc3c7;
            text-decoration: none;
            font-size: 0.9em;
            transition: color 0.15s;
        }

        .topbar-nav a:hover { color: white; }

        .main {
            max-width: 900px;
            margin: 32px auto;
            padding: 0 20px;
        }

        .flash-messages { margin-bottom: 20px; }

        .flash {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.9em;
            background: #e8f4fd;
            color: #1a5276;
            border: 1px solid #aed6f1;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            margin-bottom: 20px;
        }

        h1 { font-size: 1.7em; color: #2c3e50; margin-bottom: 20px; }
        h2 { font-size: 1.2em; color: #2c3e50; margin-bottom: 12px; }
        h3 { font-size: 1.05em; color: #34495e; margin-bottom: 8px; }

        .btn {
            display: inline-block;
            padding: 8px 18px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.15s;
        }

        .btn-primary   { background: #2c3e50; color: white; }
        .btn-primary:hover { background: #3d5166; }
        .btn-success   { background: #27ae60; color: white; }
        .btn-success:hover { background: #219a52; }
        .btn-danger    { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; }
        .btn-secondary { background: #95a5a6; color: white; }
        .btn-secondary:hover { background: #7f8c8d; }
        .btn-outline {
            background: transparent;
            color: #2c3e50;
            border: 2px solid #2c3e50;
        }
        .btn-outline:hover { background: #2c3e50; color: white; }

        .badge {
            display: inline-block;
            padding: 3px 9px;
            border-radius: 4px;
            font-size: 0.72em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-rote { background: #d5e8d4; color: #2e7d32; }
        .badge-multiple_choice { background: #dae8fc; color: #1565c0; }
        .badge-short_answer { background: #fff2cc; color: #b45309; }

        label {
            display: block;
            font-size: 0.85em;
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
        }

        input[type="text"], input[type="number"], textarea, select {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95em;
            font-family: inherit;
            background: #fafafa;
            transition: border-color 0.15s;
            margin-bottom: 14px;
        }

        input[type="text"]:focus, input[type="number"]:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #3498db;
            background: white;
        }

        textarea { resize: vertical; }

        .score-badge {
            display: inline-block;
            font-size: 1.4em;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 8px;
        }

        .score-high { background: #d5e8d4; color: #2e7d32; }
        .score-mid  { background: #fff2cc; color: #b45309; }
        .score-low  { background: #fde8e8; color: #c0392b; }

        @media (max-width: 600px) {
            .main { padding: 0 12px; margin: 20px auto; }
            .card { padding: 18px; }
            h1 { font-size: 1.4em; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="topbar">
        <a class="topbar-title" href="{{ urlroot }}">Tester</a>
        <div class="topbar-nav">
            <a href="{{ urlroot }}">Dashboard</a>
            <a href="{{ urlroot }}create">+ New Exam</a>
        </div>
    </div>
    <div class="main">
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="flash-messages">
            {% for msg in messages %}
            <div class="flash">{{ msg }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
