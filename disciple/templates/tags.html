{% extends "base.html" %}
{% block title %}Tags — Disciple{% endblock %}
{% block content %}
<h1>Tags</h1>
{% if tags %}
  <div class="card">
    <table>
      <thead>
        <tr><th>Tag</th><th style="width:100px;">Passages</th></tr>
      </thead>
      <tbody>
      {% for t in tags %}
        <tr>
          <td>
            <a href="{{ url_for('disciple.tag_detail', tag_name=t.name) }}"
               style="color:#1a3a5c; font-weight:600; text-decoration:none;">
              {{ t.name }}
            </a>
          </td>
          <td>{{ t.count }}</td>
        </tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
{% else %}
  <p style="color:#888;">No tags yet. Add tags when processing passages in the Study view.</p>
{% endif %}
{% endblock %}
