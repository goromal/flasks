<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Disciple{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f8f6f0; color: #2c2c2c; margin: 0; padding: 0;
    }
    nav {
      background: #1a3a5c; padding: 10px 20px;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
    }
    nav a { color: #e8d9b5; text-decoration: none; margin: 0 8px; font-size: 0.95em; }
    nav a:hover { text-decoration: underline; }
    .nav-brand { color: #e8d9b5; font-weight: 700; margin-right: 16px; }
    .nav-progress { color: #a0b8d0; font-size: 0.85em; }
    .container { max-width: 860px; margin: 32px auto; padding: 0 16px; }
    h1 { color: #1a3a5c; margin-top: 0; }
    h2 { color: #1a3a5c; }
    .card {
      background: white; border-radius: 8px; padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 20px;
    }
    .ref { font-weight: 600; color: #1a3a5c; font-size: 1.05em; margin-bottom: 12px; }
    .verse { margin: 6px 0; line-height: 1.75; }
    .verse.christ-ref {
      background: #fffbe6; border-left: 3px solid #c8a200;
      padding: 6px 10px; border-radius: 0 4px 4px 0;
    }
    .verse.context { color: #666; font-style: italic; }
    .verse-num { font-weight: 600; color: #888; margin-right: 6px; font-size: 0.9em; }
    .tag-chip {
      display: inline-block; background: #e8f0fe; color: #1a3a5c;
      border-radius: 12px; padding: 2px 10px; font-size: 0.82em; margin: 2px;
    }
    .btn {
      display: inline-block; padding: 8px 18px; border-radius: 5px;
      border: none; cursor: pointer; font-size: 0.95em; text-decoration: none;
      line-height: 1.4;
    }
    .btn-primary { background: #1a3a5c; color: white; }
    .btn-primary:hover { background: #254e7a; }
    .btn-secondary { background: #e0e0e0; color: #333; }
    .btn-secondary:hover { background: #ccc; }
    .btn-danger { background: #c0392b; color: white; }
    .btn-danger:hover { background: #a93226; }
    .btn-sm { padding: 4px 10px; font-size: 0.84em; }
    .field { margin-bottom: 16px; }
    label { font-weight: 600; display: block; margin-bottom: 4px; color: #444; }
    input[type=text], textarea, select {
      border: 1px solid #ccc; border-radius: 4px; padding: 7px 10px;
      font-size: 0.95em; width: 100%; font-family: inherit;
    }
    textarea { resize: vertical; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 8px 10px; border-bottom: 2px solid #ddd; color: #555; font-size: 0.88em; }
    td { padding: 8px 10px; border-bottom: 1px solid #eee; vertical-align: top; }
    .status-done { color: #2e7d32; font-weight: 700; }
    .status-pending { color: #bbb; }
    details > summary { list-style: none; }
    details > summary::-webkit-details-marker { display: none; }
    .detail-body { margin-top: 12px; padding-top: 12px; border-top: 1px solid #eee; }
  </style>
</head>
<body>
  <nav>
    <div>
      <span class="nav-brand">&#128214; Disciple</span>
      <a href="{{ url_for('disciple.study') }}">Study</a>
      <a href="{{ url_for('disciple.browse') }}">Browse</a>
      <a href="{{ url_for('disciple.tags_list') }}">Tags</a>
      <a href="{{ url_for('disciple.manage_tags') }}">Manage Tags</a>
    </div>
    <span class="nav-progress">{{ processed_groups }}/{{ total_groups }} processed</span>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
