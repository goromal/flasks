<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>anix-upgrade</title>
  <link rel="icon" type="image/svg+xml" href="{{ subdomain }}/favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/ansi_up@5/ansi_up.min.js"></script>
  <style>
    body { background: #f8f9fa; }
    .log-box {
      background: #1e1e1e; color: #d4d4d4; font-family: monospace;
      font-size: 0.85rem; border-radius: 6px; padding: 12px;
      height: 420px; overflow-y: auto; white-space: pre-wrap;
    }
    .spinner-border { width: 1rem; height: 1rem; border-width: 0.15em; }
    .dir-picker {
      border: 1px solid #dee2e6; border-radius: 6px;
      background: #fff; margin-top: 6px; overflow: hidden;
    }
    .dir-picker-header {
      display: flex; align-items: center; gap: 8px;
      background: #f1f3f5; padding: 6px 10px; border-bottom: 1px solid #dee2e6;
    }
    .dir-picker-path {
      font-family: monospace; font-size: 0.8rem; flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .dir-list {
      list-style: none; margin: 0; padding: 4px 0;
      max-height: 200px; overflow-y: auto;
    }
    .dir-btn {
      width: 100%; text-align: left; background: none; border: none;
      padding: 4px 12px; font-size: 0.85rem; cursor: pointer;
    }
    .dir-btn:hover { background: #e9ecef; }
    .dir-picker-actions {
      display: flex; justify-content: flex-end; gap: 6px;
      padding: 6px 10px; border-top: 1px solid #dee2e6; background: #f8f9fa;
    }
  </style>
</head>
<body>
<div class="container py-4" style="max-width:800px">
  <h1 class="mb-1">anix-upgrade</h1>
  <p class="text-muted mb-4">Upgrade the NixOS / home-manager system configuration on <strong id="hostname"></strong></p>

  <div class="card mb-4">
    <div class="card-body">
      <div class="d-flex align-items-center gap-3 mb-3">
        <div><strong>Current version:</strong> <span id="curr-version">{{ version }}</span>
          {% if meta %}<span class="text-muted small ms-1">({{ meta }})</span>{% endif %}
        </div>
        <span id="status-badge" class="badge
          {% if status == 'success' %}bg-success
          {% elif status == 'failed' %}bg-danger
          {% elif status == 'running' %}bg-warning text-dark
          {% else %}bg-secondary{% endif %}">
          {{ status }}
        </span>
        <span id="api-badge" class="badge bg-info" style="display:none">via API</span>
      </div>
      <div id="run-timing" class="text-muted small mb-2" style="display:none"></div>

      <form id="upgrade-form">
        <div class="mb-3">
          <label class="form-label fw-semibold">Upgrade source</label>
          <select class="form-select form-select-sm" id="source-type" onchange="onSourceTypeChange()">
            <option value="master">Latest master</option>
            <option value="version">Version tag</option>
            <option value="branch">Branch</option>
            <option value="commit">Commit</option>
            <option value="source">Local source path</option>
          </select>
        </div>

        <!-- Version -->
        <div class="mb-3 source-field" id="field-version" style="display:none">
          <label class="form-label small fw-semibold">Version tag</label>
          <input type="text" class="form-control form-control-sm" name="version" placeholder="e.g. 8.12.2">
        </div>

        <!-- Branch -->
        <div class="mb-3 source-field" id="field-branch" style="display:none">
          <label class="form-label small fw-semibold">Branch</label>
          <input type="text" class="form-control form-control-sm" name="branch" id="branch-input"
                 placeholder="e.g. dev/my-feature"
                 oninput="localStorage.setItem('anix-branch', this.value)">
        </div>

        <!-- Commit -->
        <div class="mb-3 source-field" id="field-commit" style="display:none">
          <label class="form-label small fw-semibold">Commit SHA</label>
          <input type="text" class="form-control form-control-sm" name="commit" placeholder="git SHA">
        </div>

        <!-- Source path -->
        <div class="mb-3 source-field" id="field-source" style="display:none">
          <label class="form-label small fw-semibold">Source tree path</label>
          <div class="input-group input-group-sm">
            <input type="text" class="form-control form-control-sm font-monospace" name="source"
                   id="source-path-input" placeholder="/absolute/path/to/anixpkgs" readonly>
            <button type="button" class="btn btn-outline-secondary" onclick="openDirPicker()">Browse&hellip;</button>
          </div>
          <div id="dir-picker" class="dir-picker" style="display:none">
            <div class="dir-picker-header">
              <span class="dir-picker-path" id="picker-current-path"></span>
              <button type="button" class="btn btn-sm btn-outline-secondary py-0" onclick="pickerUp()">&#8593; Up</button>
            </div>
            <ul class="dir-list" id="picker-list"></ul>
            <div class="dir-picker-actions">
              <button type="button" class="btn btn-sm btn-outline-secondary" onclick="closeDirPicker()">Cancel</button>
              <button type="button" class="btn btn-sm btn-primary" onclick="selectPickerDir()">Select</button>
            </div>
          </div>
        </div>

        <div class="d-flex gap-4 mb-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="local" value="1" id="chk-local">
            <label class="form-check-label" for="chk-local">--local</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="boot" value="1" id="chk-boot">
            <label class="form-check-label" for="chk-boot">--boot</label>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="run-btn">Run upgrade</button>
      </form>
    </div>
  </div>

  <h5>Output</h5>
  <div id="log" class="log-box mb-2"></div>
  <button class="btn btn-sm btn-outline-secondary" onclick="_clearLog()">Clear</button>
  <a id="dl-log-btn" class="btn btn-sm btn-outline-secondary ms-2" href="#">Download log</a>
</div>

<script>
const subdomain = "{{ subdomain }}";
const SOURCE_FIELDS = ['version', 'commit', 'branch', 'source'];
const STATUS_CLASSES = {
  success: ['bg-success'],
  failed: ['bg-danger'],
  running: ['bg-warning', 'text-dark'],
  idle: ['bg-secondary'],
};

let _pickerPath = '/';
const ansiUp = (typeof AnsiUp !== 'undefined') ? new AnsiUp() : null;
if (ansiUp) ansiUp.use_classes = false;

function $(id) { return document.getElementById(id); }

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Log output (batched to avoid browser freeze on large replays) ────────────

const MAX_LOG_LINES = 500;
let _logLineCount = 0;
let _logQueue = [];
let _logFlushTimer = null;
let _logTruncNotice = null;

function _clearLog() {
  clearTimeout(_logFlushTimer);
  _logFlushTimer = null;
  _logQueue = [];
  _logLineCount = 0;
  _logTruncNotice = null;
  $('log').innerHTML = '';
}

function _flushLog() {
  _logFlushTimer = null;
  if (!_logQueue.length) return;
  const log = $('log');
  const atBottom = log.scrollHeight - log.clientHeight - log.scrollTop < 20;
  const frag = document.createDocumentFragment();
  for (const html of _logQueue) {
    const line = document.createElement('span');
    line.innerHTML = html;
    frag.appendChild(line);
    _logLineCount++;
  }
  _logQueue = [];
  log.appendChild(frag);
  // Trim lines that exceed the cap (keep notice pinned at top)
  if (_logLineCount > MAX_LOG_LINES) {
    const toRemove = _logLineCount - MAX_LOG_LINES;
    let removed = 0;
    while (removed < toRemove) {
      const first = log.firstChild;
      if (!first) break;
      if (first === _logTruncNotice) {
        if (first.nextSibling) { log.removeChild(first.nextSibling); removed++; }
        else break;
      } else {
        log.removeChild(first); removed++;
      }
    }
    _logLineCount = MAX_LOG_LINES;
    if (!_logTruncNotice) {
      _logTruncNotice = document.createElement('div');
      _logTruncNotice.style.cssText = 'color:#999;font-style:italic;padding:2px 0 8px';
      _logTruncNotice.textContent = '[ Earlier output truncated — use "Download log" for full output ]';
    }
    if (log.firstChild !== _logTruncNotice) {
      log.insertBefore(_logTruncNotice, log.firstChild);
    }
  }
  if (atBottom) log.scrollTop = log.scrollHeight;
}

function appendLog(msg) {
  _logQueue.push((ansiUp ? ansiUp.ansi_to_html(msg) : escHtml(msg)) + '\n');
  if (!_logFlushTimer) _logFlushTimer = setTimeout(_flushLog, 50);
}

function resetRunButton() {
  const btn = $('run-btn');
  btn.disabled = false;
  btn.textContent = 'Run upgrade';
}

function setRunButtonRunning() {
  const btn = $('run-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border" role="status"></span> Running...';
}

// ── Source type dropdown ────────────────────────────────────────────────────

function onSourceTypeChange() {
  const type = $('source-type').value;
  document.querySelectorAll('.source-field').forEach(el => el.style.display = 'none');
  if (type !== 'master') {
    $('field-' + type).style.display = '';
  }
  closeDirPicker();
}

// ── Dir picker ──────────────────────────────────────────────────────────────

function openDirPicker() {
  _pickerPath = $('source-path-input').value || '/';
  $('dir-picker').style.display = '';
  loadPickerDirs(_pickerPath);
}

function closeDirPicker() {
  $('dir-picker').style.display = 'none';
}

function loadPickerDirs(path) {
  fetch(subdomain + '/api/list-dirs', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({path: path})
  })
  .then(r => r.json())
  .then(data => {
    if (data.error) { alert('Error: ' + data.error); return; }
    _pickerPath = data.path;
    $('picker-current-path').textContent = data.path;
    const list = $('picker-list');
    list.innerHTML = '';
    data.dirs.forEach(dir => {
      const li = document.createElement('li');
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'dir-btn';
      btn.textContent = '📁 ' + dir;
      const fullPath = data.path === '/' ? '/' + dir : data.path + '/' + dir;
      btn.onclick = () => loadPickerDirs(fullPath);
      li.appendChild(btn);
      list.appendChild(li);
    });
  })
  .catch(err => alert('Error: ' + err));
}

function pickerUp() {
  if (_pickerPath === '/') return;
  const parent = _pickerPath.replace(/\/[^/]+\/?$/, '') || '/';
  loadPickerDirs(parent);
}

function selectPickerDir() {
  $('source-path-input').value = _pickerPath;
  localStorage.setItem('anix-source-path', _pickerPath);
  closeDirPicker();
}

// ── Status ──────────────────────────────────────────────────────────────────

function setStatus(s) {
  const badge = $('status-badge');
  badge.textContent = s;
  badge.className = 'badge';
  badge.classList.add(...(STATUS_CLASSES[s] || STATUS_CLASSES.idle));
}

let es = null;
let _lastSeenRunId = null;

function fmtDuration(seconds) {
  if (seconds < 60) return seconds + 's';
  return Math.floor(seconds / 60) + 'm ' + (seconds % 60) + 's';
}

function updateRunTiming(data) {
  const el = $('run-timing');
  if (!data.started_at) { el.style.display = 'none'; return; }
  const start = new Date(data.started_at);
  const startStr = start.toLocaleString(undefined, {dateStyle:'short', timeStyle:'short'});
  if (data.finished_at) {
    const secs = Math.round((new Date(data.finished_at) - start) / 1000);
    el.textContent = 'Triggered ' + startStr + ' · completed in ' + fmtDuration(secs);
  } else {
    el.textContent = 'Triggered ' + startStr;
  }
  el.style.display = '';
}

function pollStatus() {
  fetch(subdomain + '/status')
    .then(r => r.json())
    .then(data => {
      $('curr-version').textContent = data.version || 'unknown';
      setStatus(data.status || 'idle');
      $('api-badge').style.display = (data.source === 'api') ? '' : 'none';
      updateRunTiming(data);
      if (data.running) setRunButtonRunning();
      else resetRunButton();
      const rid = data.run_id;
      if (rid && rid !== _lastSeenRunId && !es) {
        _lastSeenRunId = rid;
        attachStream();
      }
    })
    .catch(() => {});
}

// ── Output stream ───────────────────────────────────────────────────────────

function attachStream() {
  if (es) es.close();
  es = new EventSource(subdomain + '/stream');
  // Also fires on auto-reconnect (e.g. the upgrade restarted this service):
  // clear the log so the server-side replay isn't duplicated.
  es.onopen = () => { _clearLog(); };
  es.onmessage = (ev) => {
    if (ev.data === '[DONE]') {
      es.close();
      es = null;
      resetRunButton();
      pollStatus();
      return;
    }
    appendLog(ev.data);
  };
  // If the stream dies after the run already ended, recover the button state.
  es.onerror = () => { pollStatus(); };
}

// ── Form submit ─────────────────────────────────────────────────────────────

$('upgrade-form').addEventListener('submit', function(e) {
  e.preventDefault();

  // Only send the field matching the selected source type.
  const fd = new FormData(this);
  const type = $('source-type').value;
  SOURCE_FIELDS.forEach(k => { if (k !== type) fd.delete(k); });

  setRunButtonRunning();
  setStatus('running');

  fetch(subdomain + '/run', { method: 'POST', body: fd })
    .then(r => r.json().then(data => ({ ok: r.ok, data })))
    .then(({ ok, data }) => {
      if (!ok) {
        appendLog('[Upgrade already in progress]');
      } else {
        _lastSeenRunId = data.run_id;
      }
      attachStream();
    })
    .catch(err => {
      appendLog('Error: ' + err);
      resetRunButton();
      setStatus('failed');
    });
});

// Restore saved fields on load
const _savedPath = localStorage.getItem('anix-source-path');
const _savedBranch = localStorage.getItem('anix-branch');
if (_savedBranch) $('branch-input').value = _savedBranch;
if (_savedPath) {
  $('source-path-input').value = _savedPath;
  $('source-type').value = 'source';
  onSourceTypeChange();
}

$('dl-log-btn').href = subdomain + '/log';

document.getElementById('hostname').textContent = location.hostname;

pollStatus();
attachStream();
setInterval(pollStatus, 30000);
</script>
</body>
</html>
